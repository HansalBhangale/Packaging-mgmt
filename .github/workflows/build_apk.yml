name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ── 1. Get your code ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Verify all required files are present ──────────────────────────────
      - name: Check required files
        run: |
          echo "📁 Files in repo:"
          ls -la
          MISSING=0
          for f in main.py database.py buildozer.spec; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f  ← you must upload this to GitHub!"
              MISSING=1
            fi
          done
          [ $MISSING -eq 1 ] && exit 1 || echo "All files present ✓"

      # ── 3. Cache the heavy Android SDK/NDK downloads ──────────────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        id: cache-buildozer
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-

      # ── 4. Build using the official Buildozer Docker action ───────────────────
      #    This image ships with Python, Android SDK, NDK, AIDL — everything.
      - name: Build APK with Buildozer Docker Action
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          workdir: .
          buildozer-version: stable

      # ── 5. Show what was produced ─────────────────────────────────────────────
      - name: List APK files
        run: |
          echo "📦 Built files:"
          find . -name "*.apk" -exec ls -lh {} \;

      # ── 6. Upload APK so you can download it ──────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PackManager-APK
          path: ${{ steps.buildozer.outputs.filename }}
          if-no-files-found: error
          retention-days: 30
