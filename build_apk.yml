name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub website

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Get your code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. System dependencies ──────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      # ── 4. Python build tools ───────────────────────────────────────────────
      - name: Install Buildozer + Cython
        run: pip install buildozer cython==0.29.33

      # ── 5. Cache Android SDK/NDK (speeds up repeat builds a lot) ───────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      # ── 6. Build the debug APK ───────────────────────────────────────────────
      - name: Build APK
        run: buildozer -v android debug

      # ── 7. Upload the APK as a downloadable artifact ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PackManager-APK
          path: bin/*.apk
          retention-days: 30   # APK stays available for 30 days
